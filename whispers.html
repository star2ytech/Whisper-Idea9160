<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Whispers — USYD Tunnel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a12;
    --bg-soft: #14141f;
    --text: #e8e8f0;
    --text-dim: #8a8aa0;
    --accent: #ffb86b;
    --accent-soft: rgba(255, 184, 107, 0.15);
    --border: rgba(255, 255, 255, 0.08);
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background glow */
  body::before {
    content: "";
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 20%, rgba(255, 184, 107, 0.08), transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(107, 184, 255, 0.06), transparent 50%);
    z-index: -1;
    animation: drift 30s ease-in-out infinite alternate;
  }

  @keyframes drift {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-5%, 5%); }
  }

  #app {
    max-width: 600px;
    margin: 0 auto;
    padding: 24px 20px 120px;
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 24px 0 32px;
  }

  .logo {
    font-size: 32px;
    font-weight: 300;
    letter-spacing: 8px;
    text-transform: lowercase;
    background: linear-gradient(90deg, #ffb86b, #ff7eb6, #7eb6ff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 8px;
    letter-spacing: 1px;
  }

  .tunnel-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    padding: 4px 12px;
    background: var(--accent-soft);
    border-radius: 20px;
    font-size: 11px;
    color: var(--accent);
  }

  .pulse-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* Feed */
  .feed-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding: 0 4px;
  }

  .feed-header h2 {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .feed-count {
    font-size: 12px;
    color: var(--text-dim);
  }

  .feed {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 200px;
  }

  .message {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    position: relative;
    animation: fadeIn 0.6s ease-out;
    transition: transform 0.2s;
  }

  .message:hover {
    transform: translateY(-1px);
  }

  .message.new {
    animation: glow 2s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes glow {
    0% { box-shadow: 0 0 0 rgba(255, 184, 107, 0); }
    30% { box-shadow: 0 0 40px rgba(255, 184, 107, 0.5); }
    100% { box-shadow: 0 0 0 rgba(255, 184, 107, 0); }
  }

  .message-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .message-color-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .message-text {
    font-size: 15px;
    line-height: 1.5;
    word-wrap: break-word;
  }

  .message-audio {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
  }

  .message-audio audio {
    flex: 1;
    height: 32px;
  }

  .audio-wave {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 24px;
  }

  .audio-wave span {
    width: 2px;
    background: var(--accent);
    border-radius: 2px;
    animation: wave 1.2s ease-in-out infinite;
  }

  .audio-wave span:nth-child(1) { height: 40%; animation-delay: 0s; }
  .audio-wave span:nth-child(2) { height: 70%; animation-delay: 0.15s; }
  .audio-wave span:nth-child(3) { height: 100%; animation-delay: 0.3s; }
  .audio-wave span:nth-child(4) { height: 60%; animation-delay: 0.45s; }
  .audio-wave span:nth-child(5) { height: 80%; animation-delay: 0.6s; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.5); }
    50% { transform: scaleY(1); }
  }

  /* Compose area */
  .compose {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, var(--bg) 70%, transparent);
    padding: 20px;
    z-index: 10;
  }

  .compose-inner {
    max-width: 560px;
    margin: 0 auto;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px;
  }

  .tab-row {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
  }

  .tab-btn {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 13px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--accent-soft);
    color: var(--accent);
  }

  .compose-input {
    display: none;
  }

  .compose-input.active {
    display: block;
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 15px;
    padding: 12px;
    resize: none;
    font-family: inherit;
    min-height: 60px;
    outline: none;
  }

  textarea::placeholder {
    color: var(--text-dim);
  }

  .char-count {
    text-align: right;
    font-size: 11px;
    color: var(--text-dim);
    padding: 0 12px 4px;
  }

  .audio-recorder {
    padding: 16px;
    text-align: center;
  }

  .record-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: #dc3545;
    border: 4px solid rgba(220, 53, 69, 0.3);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
    transition: all 0.2s;
  }

  .record-btn:hover { transform: scale(1.05); }
  .record-btn.recording { animation: recording 1s ease-in-out infinite; }

  @keyframes recording {
    0%, 100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); }
    50% { box-shadow: 0 0 0 16px rgba(220, 53, 69, 0); }
  }

  .record-btn svg { fill: white; width: 24px; height: 24px; }

  .record-status {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .audio-preview {
    margin-top: 8px;
  }

  .audio-preview audio {
    width: 100%;
    height: 36px;
  }

  .bottom-row {
    display: flex;
    gap: 8px;
    padding: 4px;
  }

  .send-btn {
    flex: 1;
    padding: 14px;
    background: var(--accent);
    color: #1a1a2a;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .send-btn:hover { transform: translateY(-1px); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Controls (top right) */
  .controls {
    position: fixed;
    top: 16px;
    right: 16px;
    display: flex;
    gap: 8px;
    z-index: 20;
  }

  .ctrl-btn {
    padding: 6px 10px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px;
    border-radius: 8px;
    cursor: pointer;
  }

  .ctrl-btn:hover { color: var(--text); }

  /* Display mode */
  body.display-mode #app { display: none; }
  body.display-mode .compose { display: none; }
  body.display-mode .controls .ctrl-btn:not(.exit-display) { display: none; }

  #display {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    padding: 40px;
    overflow: hidden;
  }

  body.display-mode #display {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .display-message {
    position: absolute;
    max-width: 500px;
    padding: 24px 32px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 22px;
    line-height: 1.4;
    animation: float 8s ease-in-out forwards;
    opacity: 0;
  }

  @keyframes float {
    0% { opacity: 0; transform: translateY(20px) scale(0.95); }
    15%, 85% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-20px) scale(0.95); }
  }

  .display-title {
    position: absolute;
    top: 40px;
    left: 40px;
    font-size: 14px;
    color: var(--text-dim);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* Flash animation when new message sent */
  .flash-overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, var(--accent-soft), transparent 60%);
    opacity: 0;
    pointer-events: none;
    z-index: 50;
  }

  .flash-overlay.active {
    animation: flash 1.2s ease-out;
  }

  @keyframes flash {
    0% { opacity: 0; }
    30% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<div class="controls">
  <button class="ctrl-btn" onclick="toggleDisplay()">📺 Display</button>
  <button class="ctrl-btn exit-display" onclick="toggleDisplay()" style="display:none">✕ Exit</button>
  <button class="ctrl-btn" onclick="clearAll()">🗑 Reset</button>
</div>

<div id="app">
  <header>
    <div class="logo">whispers</div>
    <div class="subtitle">messages left in the tunnel</div>
    <div class="tunnel-indicator">
      <span class="pulse-dot"></span>
      USYD · Fisher Tunnel
    </div>
  </header>

  <div class="feed-header">
    <h2>Recent whispers</h2>
    <span class="feed-count" id="feedCount">0 messages</span>
  </div>

  <div class="feed" id="feed"></div>
</div>

<div id="display">
  <div class="display-title">whispers · live</div>
</div>

<div class="compose">
  <div class="compose-inner">
    <div class="tab-row">
      <button class="tab-btn active" data-tab="text">✍️  Write</button>
      <button class="tab-btn" data-tab="audio">🎙️  Speak</button>
    </div>

    <div class="compose-input active" id="textInput">
      <textarea
        id="textArea"
        maxlength="200"
        placeholder="Leave something for the next person walking through..."
      ></textarea>
      <div class="char-count"><span id="charCount">0</span> / 200</div>
    </div>

    <div class="compose-input" id="audioInput">
      <div class="audio-recorder">
        <button class="record-btn" id="recordBtn" onclick="toggleRecord()">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="6"/></svg>
        </button>
        <div class="record-status" id="recordStatus">Tap to record (max 30s)</div>
        <div class="audio-preview" id="audioPreview"></div>
      </div>
    </div>

    <div class="bottom-row">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        Send into the tunnel  →
      </button>
    </div>
  </div>
</div>

<div class="flash-overlay" id="flash"></div>

<script>
  // ============================================================
  // STORAGE LAYER — swap this block for Firebase when you're ready
  // ============================================================
  const Storage = {
    KEY: 'whispers_v1',
    getAll() {
      try {
        return JSON.parse(localStorage.getItem(this.KEY)) || [];
      } catch { return []; }
    },
    save(messages) {
      localStorage.setItem(this.KEY, JSON.stringify(messages));
    },
    add(msg) {
      const all = this.getAll();
      all.unshift(msg);
      this.save(all);
    },
    clear() {
      localStorage.removeItem(this.KEY);
    }
  };

  // Seed data — realistic messages from USYD new/international students
  const SEED = [
    { id: 's1', type: 'text', content: "first week. haven't spoken to anyone all day. this is oddly comforting.", color: '#ffb86b', ts: Date.now() - 1000 * 60 * 45 },
    { id: 's2', type: 'text', content: "to whoever walks through next — it gets easier. promise.", color: '#ff7eb6', ts: Date.now() - 1000 * 60 * 120 },
    { id: 's3', type: 'text', content: "i miss hometown food 😭", color: '#7eb6ff', ts: Date.now() - 1000 * 60 * 200 },
    { id: 's4', type: 'text', content: "design thinking group project is killing me. if you're in IDEA9106, we got this.", color: '#b67eff', ts: Date.now() - 1000 * 60 * 360 },
    { id: 's5', type: 'text', content: "took me a month to figure out the bus system. you're not alone.", color: '#7effb6', ts: Date.now() - 1000 * 60 * 540 },
    { id: 's6', type: 'text', content: "walking through here alone at night feels different when others have been here too.", color: '#ffd47e', ts: Date.now() - 1000 * 60 * 720 },
  ];

  const COLORS = ['#ffb86b', '#ff7eb6', '#7eb6ff', '#b67eff', '#7effb6', '#ffd47e', '#ff9b9b'];

  // ============================================================
  // INITIALIZE
  // ============================================================
  function init() {
    if (Storage.getAll().length === 0) {
      Storage.save(SEED);
    }
    renderFeed();
    setupTabs();
    setupTextInput();
  }

  function renderFeed() {
    const feed = document.getElementById('feed');
    const messages = Storage.getAll();
    document.getElementById('feedCount').textContent =
      `${messages.length} message${messages.length === 1 ? '' : 's'}`;

    if (messages.length === 0) {
      feed.innerHTML = '<div class="empty">no whispers yet. be the first.</div>';
      return;
    }

    feed.innerHTML = messages.map(m => renderMessage(m)).join('');
  }

  function renderMessage(m) {
    const timeAgo = getTimeAgo(m.ts);
    const content = m.type === 'audio'
      ? `<div class="message-audio">
           <div class="audio-wave"><span></span><span></span><span></span><span></span><span></span></div>
           <audio controls src="${m.content}"></audio>
         </div>`
      : `<div class="message-text">${escapeHtml(m.content)}</div>`;

    return `
      <div class="message ${m.isNew ? 'new' : ''}" style="border-left: 3px solid ${m.color}">
        <div class="message-meta">
          <span class="message-color-dot" style="background:${m.color}"></span>
          <span>anonymous</span>
          <span>·</span>
          <span>${timeAgo}</span>
          <span>·</span>
          <span>${m.type === 'audio' ? '🎙️ voice' : '✍️ text'}</span>
        </div>
        ${content}
      </div>
    `;
  }

  function getTimeAgo(ts) {
    const diff = Date.now() - ts;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ============================================================
  // TABS
  // ============================================================
  function setupTabs() {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.compose-input').forEach(i => i.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + 'Input').classList.add('active');
        updateSendState();
      });
    });
  }

  // ============================================================
  // TEXT
  // ============================================================
  function setupTextInput() {
    const ta = document.getElementById('textArea');
    ta.addEventListener('input', () => {
      document.getElementById('charCount').textContent = ta.value.length;
      updateSendState();
    });
  }

  // ============================================================
  // AUDIO RECORDING
  // ============================================================
  let mediaRecorder = null;
  let audioChunks = [];
  let recordTimer = null;
  let recordedBlob = null;
  let recordedDataUrl = null;

  async function toggleRecord() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      stopRecording();
    } else {
      await startRecording();
    }
  }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = () => {
        recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.onloadend = () => {
          recordedDataUrl = reader.result;
          showAudioPreview();
          updateSendState();
        };
        reader.readAsDataURL(recordedBlob);
        stream.getTracks().forEach(t => t.stop());
      };
      mediaRecorder.start();
      document.getElementById('recordBtn').classList.add('recording');

      let seconds = 0;
      const statusEl = document.getElementById('recordStatus');
      statusEl.textContent = 'Recording... 0s / 30s';
      recordTimer = setInterval(() => {
        seconds++;
        statusEl.textContent = `Recording... ${seconds}s / 30s`;
        if (seconds >= 30) stopRecording();
      }, 1000);
    } catch (err) {
      alert('Microphone access denied or unavailable.\n\nError: ' + err.message);
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    }
    clearInterval(recordTimer);
    document.getElementById('recordBtn').classList.remove('recording');
    document.getElementById('recordStatus').textContent = 'Recording saved. Tap to re-record.';
  }

  function showAudioPreview() {
    document.getElementById('audioPreview').innerHTML =
      `<audio controls src="${recordedDataUrl}"></audio>`;
  }

  // ============================================================
  // SEND
  // ============================================================
  function updateSendState() {
    const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
    const btn = document.getElementById('sendBtn');
    if (activeTab === 'text') {
      btn.disabled = document.getElementById('textArea').value.trim().length === 0;
    } else {
      btn.disabled = !recordedDataUrl;
    }
  }

  function sendMessage() {
    const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    let msg;

    if (activeTab === 'text') {
      const text = document.getElementById('textArea').value.trim();
      if (!text) return;
      msg = {
        id: 'm' + Date.now(),
        type: 'text',
        content: text,
        color: color,
        ts: Date.now(),
        isNew: true
      };
      document.getElementById('textArea').value = '';
      document.getElementById('charCount').textContent = '0';
    } else {
      if (!recordedDataUrl) return;
      msg = {
        id: 'm' + Date.now(),
        type: 'audio',
        content: recordedDataUrl,
        color: color,
        ts: Date.now(),
        isNew: true
      };
      recordedDataUrl = null;
      recordedBlob = null;
      document.getElementById('audioPreview').innerHTML = '';
      document.getElementById('recordStatus').textContent = 'Tap to record (max 30s)';
    }

    Storage.add(msg);
    renderFeed();
    flashLight();
    updateSendState();
    window.scrollTo({ top: 0, behavior: 'smooth' });

    // clear isNew flag after animation
    setTimeout(() => {
      const all = Storage.getAll();
      if (all[0]) { delete all[0].isNew; Storage.save(all); }
    }, 2000);
  }

  function flashLight() {
    const flash = document.getElementById('flash');
    flash.classList.remove('active');
    void flash.offsetWidth; // force reflow
    flash.classList.add('active');
  }

  // ============================================================
  // RESET
  // ============================================================
  function clearAll() {
    if (confirm('Clear all messages? (This is for test session reset.)')) {
      Storage.clear();
      Storage.save(SEED);
      renderFeed();
    }
  }

  // ============================================================
  // DISPLAY MODE — for projector / laptop at corridor exit
  // ============================================================
  let displayInterval = null;
  let displayIdx = 0;

  function toggleDisplay() {
    document.body.classList.toggle('display-mode');
    const on = document.body.classList.contains('display-mode');
    document.querySelector('.exit-display').style.display = on ? 'block' : 'none';
    document.querySelectorAll('.ctrl-btn:not(.exit-display)').forEach(b => {
      b.style.display = on ? 'none' : '';
    });

    if (on) {
      startDisplay();
    } else {
      stopDisplay();
    }
  }

  function startDisplay() {
    const display = document.getElementById('display');
    display.querySelectorAll('.display-message').forEach(el => el.remove());
    displayIdx = 0;
    cycleDisplay();
    displayInterval = setInterval(cycleDisplay, 4000);
  }

  function stopDisplay() {
    clearInterval(displayInterval);
    document.getElementById('display').querySelectorAll('.display-message').forEach(el => el.remove());
  }

  function cycleDisplay() {
    const messages = Storage.getAll().filter(m => m.type === 'text');
    if (messages.length === 0) return;
    const msg = messages[displayIdx % messages.length];
    displayIdx++;

    const el = document.createElement('div');
    el.className = 'display-message';
    el.style.borderLeft = `3px solid ${msg.color}`;
    el.style.top = (20 + Math.random() * 50) + '%';
    el.style.left = (10 + Math.random() * 40) + '%';
    el.textContent = msg.content;
    document.getElementById('display').appendChild(el);

    setTimeout(() => el.remove(), 8000);
  }

  // ============================================================
  init();
</script>
</body>
</html>
